services:
  backend:
    build: ./backend
    image: ya-music-obs-widget-backend:latest
    container_name: ya-music-obs-widget-backend
    restart: unless-stopped
    environment:
      ADDR: ":8787"
      DATA_DIR: "/data"
    ports:
      - "8787:8787"
    volumes:
      - backend-data:/data

volumes:
  backend-data:
