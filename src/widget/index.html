<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Now Playing Widget</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="widget" id="widget">
    <img class="widget__cover" id="cover" alt="" />
    <div class="widget__meta">
      <div class="widget__title" id="title">Now Playing</div>
      <div class="widget__artist" id="artist">—</div>
      <div class="widget__time" id="time">00:00 / 00:00</div>
      <div class="widget__progress">
        <div class="widget__progress-fill" id="progress"></div>
      </div>
    </div>
  </div>
  <style id="customCssSlot"></style>
  <script type="module" src="./main.js"></script>
</body>
</html>
